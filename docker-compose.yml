services:
  api:
    build: .
    ports:
      - "${API_PORT:-8000}:8000"
    env_file: .env
    volumes:
      - rag-data:/app/data
      - rag-storage:/app/storage
      - rag-embeddings:/app/embeddings
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import httpx; httpx.get('http://localhost:8000/health').raise_for_status()"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  ui:
    build: .
    command: ["streamlit", "run", "ui/streamlit_app.py", "--server.port=8501", "--server.address=0.0.0.0"]
    ports:
      - "8501:8501"
    environment:
      RAG_API_URL: "http://api:8000"
      RAG_API_KEY: "${RAG_API_KEY:-}"
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped

volumes:
  rag-data:
  rag-storage:
  rag-embeddings:
